services:
  - type: web
    name: ai-agent-production
    runtime: docker
    rootDir: 06-lab-complete
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: MAX_TOOL_ROUNDS
        value: "3"
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DAILY_BUDGET_USD
        value: "5.0"
      - key: INPUT_COST_PER_MILLION_USD
        value: "0.54"
      - key: OUTPUT_COST_PER_MILLION_USD
        value: "4.50"
      - key: RATE_LIMIT_PER_MINUTE
        value: "20"

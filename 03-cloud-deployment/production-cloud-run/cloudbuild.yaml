# ============================================================
# cloudbuild.yaml — Google Cloud Build CI/CD Pipeline
#
# Trigger: tự động chạy khi push lên main branch
# Steps: test -> build Docker image -> push -> deploy to Cloud Run
#
# Setup:
#   gcloud builds submit --config cloudbuild.yaml .
# ============================================================

steps:
  # ──────────────────────────────────────
  # Step 1: Run tests
  # ──────────────────────────────────────
  - name: python:3.11-slim
    id: test
    entrypoint: bash
    args:
      - -c
      - |
        pip install -r requirements.txt pytest
        pytest tests/ -v --tb=short
        echo "Tests passed"

  # ──────────────────────────────────────
  # Step 2: Build Docker image
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/ai-agent:$BUILD_ID
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/ai-agent:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/ai-agent:latest
      - .
    waitFor: [test]

  # ──────────────────────────────────────
  # Step 3: Push to Container Registry
  # ──────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/ai-agent
    waitFor: [build]

  # ──────────────────────────────────────
  # Step 4: Deploy to Cloud Run
  # ──────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ai-agent
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/ai-agent:$BUILD_ID
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated       # Public endpoint
      - --min-instances=0             # Scale-to-zero để tiết kiệm chi phí demo
      - --max-instances=10            # Giới hạn scale
      - --memory=512Mi
      - --cpu=1
      - --timeout=60s
      - --set-env-vars=ENVIRONMENT=production
    waitFor: [push]

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/ai-agent:$BUILD_ID
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/ai-agent:latest

substitutions:
  _REGION: asia-southeast1
  _REPOSITORY: cloud-run-source-deploy

# ──────────────────────────────────────
# Build options
# ──────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

# ──────────────────────────────────────
# Build timeout
# ──────────────────────────────────────
timeout: 1200s  # 20 phút max
